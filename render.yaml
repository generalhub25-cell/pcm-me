services:
  - type: web
    name: pcm-me
    runtime: node
    plan: free
    rootDir: pcm-me
    # Install devDeps (tsx/typescript), create schema + seed (push runs only
    # outside production), then build.
    buildCommand: "npm install --include=dev && NODE_ENV=development node --import tsx src/seed/run.ts && npm run build"
    startCommand: "npm start"
    autoDeployTrigger: off
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # Neon Postgres — paste the DIRECT (non-pooling) connection string in the
      # Render dashboard. Persistent runtime needs no pgbouncer.
      - key: DATABASE_URL
        sync: false
      # Render generates a strong secret automatically.
      - key: PAYLOAD_SECRET
        generateValue: true
      # Set to the live Render URL after the service is created (optional;
      # affects canonical/OG/sitemap absolute URLs only).
      - key: SITE_URL
        sync: false
      - key: APPLICATION_DELIVERY
        value: both
      - key: APPLICATIONS_RECIPIENT
        value: applications@pcm.me
      - key: CONTACT_RECIPIENT
        value: contact@pcm.me
      # Real admin login (replaces the insecure default). Set both.
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      # Resend transactional email (Step 3). EMAIL_FROM must be a Resend-verified
      # address (or onboarding@resend.dev for testing).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Supabase Storage (S3-compatible) for uploads (Step 2).
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
